              spaceId:
                description: |-
                  SpaceID optionally specifies the target Mondoo space for asset routing.
                  When set, scanned assets are sent to this space instead of the space
                  associated with the service account credentials. This allows using an
                  org-level service account across multiple spaces.
                type: string
            required:
            - mondooCredsSecretRef
            type: object
          status:
            description: MondooAuditConfigStatus defines the observed state of MondooAuditConfig
            properties:
              cnspecImageDigest:
                description: CnspecImageDigest contains the digest of the cnspec image
                  used for scanning
                type: string
              cnspecVersion:
                description: |-
                  CnspecVersion contains the semantic version of the cnspec image, extracted from the
                  org.opencontainers.image.version OCI label.
                type: string
              conditions:
                description: Conditions includes detailed status for the MondooAuditConfig
                items:
                  properties:
                    affectedPods:
                      description: AffectedPods, when filled, contains a list which
                        are affected by an issue
                      items:
                        type: string
                      type: array
                    lastTransitionTime:
                      description: LastTransitionTime is the last time the condition
                        transitioned from one status to another.
                      format: date-time
                      type: string
                    lastUpdateTime:
                      description: LastUpdateTime is the last time we probed the condition
                      format: date-time
                      type: string
                    memoryLimit:
                      description: MemoryLimit contains the currently active memory
                        limit for a Pod
                      type: string
                    message:
                      description: Message is a human-readable message indicating
                        details about the last transition
                      type: string
                    reason:
                      description: Reason is a unique, one-word, CamelCase reason
                        for the condition's last transition
                      type: string
                    status:
                      description: Status is the status of the condition
                      type: string
                    type:
                      description: Type is the specific type of the condition
                      type: string
                  required:
                  - status
                  - type
                  type: object
                type: array
              lastK8sResourceGarbageCollectionTime:
                description: |-
                  LastK8sResourceGarbageCollectionTime tracks the last time the operator performed
                  garbage collection of stale K8s resource scan assets.
                format: date-time
                type: string
              lastNodeScanGarbageCollectionTime:
                description: |-
                  LastNodeScanGarbageCollectionTime tracks the last time the operator performed
                  garbage collection of stale node scan assets.
                format: date-time
                type: string
              pods:
                description: Pods store the name of the pods which are running mondoo
                  instances
                items:
                  type: string
                type: array
              reconciledByOperatorVersion:
                description: ReconciledByOperatorVersion contains the version of the
                  operator which reconciled this MondooAuditConfig
                type: string
              scanningPaused:
                description: |-
                  ScanningPaused indicates that the Mondoo console has paused scanning for
                  this integration. When true, all scan CronJobs are suspended.
                  Only set when ConsoleIntegration is enabled.
                type: boolean
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
