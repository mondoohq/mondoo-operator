name: Security Tests
on:
  workflow_call:
    secrets:
      MONDOO_CLIENT:
        required: true

# SECURITY: This workflow checks out and executes PR head code with access to secrets.
# When called via pull_request_target (tests-forks.yaml), this code is untrusted.
# Access controls are enforced by the calling workflow's label gate.
#
# https://docs.github.com/en/actions/security-guides/automatic-token-authentication#permissions-for-the-github_token
permissions:
  contents: read

jobs:
  security-tests:
    runs-on: ubuntu-latest
    name: Security tests
    env:
      # Use docker.io for Docker Hub if empty
      REGISTRY: ghcr.io
      # github.repository as <account>/<repo>
      IMAGE_NAME: ${{ github.repository }}
      RELEASE: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Import environment variables from file
        run: cat ".github/env" >> $GITHUB_ENV
      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"
          cache: false
      - name: Scan AWS terraform with Mondoo
        uses: mondoohq/actions/terraform-hcl@20caefcb2d1258d051149913cde321a698b1fdb9 # v13.1.0
        env:
          MONDOO_CONFIG_BASE64: ${{ secrets.MONDOO_CLIENT }}
        with:
          path: ".github/terraform/aws/main.tf"
      - name: Scan Azure terraform with Mondoo
        uses: mondoohq/actions/terraform-hcl@20caefcb2d1258d051149913cde321a698b1fdb9 # v13.1.0
        env:
          MONDOO_CONFIG_BASE64: ${{ secrets.MONDOO_CLIENT }}
        with:
          path: ".github/terraform/aks/main.tf"
      - name: Generate manifests
        run: make generate-manifests IMG='${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.RELEASE }}'
      - name: Scan Kubernetes Manifest with Mondoo
        uses: mondoohq/actions/k8s-manifest@20caefcb2d1258d051149913cde321a698b1fdb9 # v13.1.0
        env:
          MONDOO_CONFIG_BASE64: ${{ secrets.MONDOO_CLIENT }}
        with:
          path: "mondoo-operator-manifests.yaml"
