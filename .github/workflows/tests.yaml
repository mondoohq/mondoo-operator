name: Run Test
on:
  pull_request:
  push:
    paths-ignore:
      - 'docs/**'
    branches:
      - "main"
  schedule:
    - cron: '0 4 * * 3' # Every Wednesday at 4:00 AM

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: false

# https://docs.github.com/en/actions/security-guides/automatic-token-authentication#permissions-for-the-github_token
permissions:
  contents: read

jobs:
  event_file:
    name: "Store event file"
    runs-on: ubuntu-latest
    steps:
    - name: Upload
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: Event File
        path: ${{ github.event_path }}
  unit-tests:
    # Fork PRs intentionally run here under the pull_request event. This workflow
    # has a read-only token and GitHub withholds repository secrets from forks.
    if: |
      github.event_name != 'pull_request'
      || github.event.pull_request.user.login != 'dependabot[bot]'
    uses: ./.github/workflows/unit-tests.yaml
    name: Unit tests
  allow-secret-tests:
    name: Allow tests requiring secrets
    needs: [unit-tests]
    # Central trust boundary for every job below that receives repository secrets.
    if: |
      needs.unit-tests.result == 'success'
      && (github.event_name != 'pull_request'
      || (!github.event.pull_request.head.repo.fork
      && github.event.pull_request.user.login != 'dependabot[bot]'))
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - run: echo "Secret-bearing tests are allowed for this event"
  security-tests:
    name: Security tests
    needs: [allow-secret-tests]
    uses: ./.github/workflows/security-tests.yaml
    secrets: inherit
  integration-tests:
    name: Integration tests
    needs: [allow-secret-tests]
    uses: ./.github/workflows/integration-tests.yaml
    with:
      cnspecImageTag: ""
    secrets: inherit
  helm-tests:
    name: Helm tests
    needs: [allow-secret-tests]
    uses: ./.github/workflows/helm-tests.yaml
    permissions:
      contents: read
      actions: read
      checks: write
      statuses: write
      pull-requests: write
    secrets:
      MONDOO_TEST_ORG_TOKEN: ${{ secrets.MONDOO_TEST_ORG_TOKEN }}
